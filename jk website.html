<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JK Security Hardwares & Networking</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #020617;
  color: #fff;
}

/* Background */
.bg-video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  filter: brightness(0.35);
}

/* Header */
header {
  text-align: center;
  padding: 50px 20px;
  background: rgba(0,0,0,0.65);
}

/* Buttons */
.btn {
  display: inline-block;
  margin: 10px;
  padding: 12px 28px;
  border-radius: 30px;
  background: #00e5ff;
  color: #000;
  text-decoration: none;
  font-weight: 600;
  box-shadow: 0 0 10px #00e5ff;
  transition: 0.3s;
}

.btn:hover {
  box-shadow: 0 0 25px #00e5ff;
  transform: translateY(-2px);
}

/* Section */
section {
  padding: 70px 20px;
  text-align: center;
}

/* Services */
.services {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
  max-width: 1000px;
  margin: auto;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

/* Gallery */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap: 15px;
  max-width: 1000px;
  margin: auto;
}

.gallery img,
.gallery video {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
  transition: 0.3s;
}

.gallery img:hover,
.gallery video:hover {
  transform: scale(1.05);
}

/* Form */
.form-container {
  display: flex;
  justify-content: center;
}

form {
  width: 100%;
  max-width: 420px;
  background: rgba(255,255,255,0.06);
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(0,255,255,0.15);
}

form input, form textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

form button {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: #00e5ff;
  font-weight: 600;
  box-shadow: 0 0 10px #00e5ff;
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  background: #000;
  color: #aaa;
}

</style>
</head>

<body>

<video autoplay muted loop class="bg-video">
  <source src="https://www.w3schools.com/howto/rain.mp4">
</video>

<header>
<h1>JK Security Hardwares & Networking</h1>
<p>Advanced CCTV | Networking | Laptop Services</p>

<a class="btn" href="tel:07305159812">📞 Call Now</a>

<a class="btn"
href="https://wa.me/917305159812?text=Hello%2C%20I%20need%20CCTV%20installation">
💬 WhatsApp
</a>
</header>

<section>
<h2>💼 Our Services</h2>
<div class="services">
<div class="card">📷 CCTV Installation</div>
<div class="card">📡 WiFi Camera Setup</div>
<div class="card">💻 Laptop Service</div>
<div class="card">🌐 Networking Solutions</div>
</div>
</section>

<section>
<h2>🖼️ Projects</h2>
<div class="gallery" id="gallery"></div>
</section>

<section>
<h2>📩 Enquiry</h2>
<div class="form-container">
<form onsubmit="submitForm(event)">
<input type="text" placeholder="Your Name" required>
<input type="tel" placeholder="Phone Number" required>
<textarea placeholder="Your Requirement"></textarea>
<button type="submit">Submit</button>
</form>
</div>
</section>

<footer>
© 2026 JK Security Hardwares & Networking. All Rights Reserved.
</footer>

<script>

// 🔥 AUTO LOAD IMAGES + VIDEOS
function loadGallery() {
  const gallery = document.getElementById("gallery");

  // ✅ IMAGES
  for (let i = 1; i <= 25; i++) {
    const img = document.createElement("img");
    img.src = `images/image (${i}).jpeg`;
    img.onerror = () => img.remove();
    gallery.appendChild(img);
  }

  // ✅ VIDEOS
  for (let i = 1; i <= 30; i++) {
    const video = document.createElement("video");
    video.src = `images/video (${i}).mp4`;
    video.controls = true;
    video.onerror = () => video.remove();
    gallery.appendChild(video);
  }
}

loadGallery();

// FORM
function submitForm(e) {
  e.preventDefault();
  alert("Enquiry submitted! We will contact you soon.");
}

</script>

</body>
</html>
